<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="AVJ Dev - Desarrollo web profesional y ciberseguro.">
    <meta name="theme-color" content="#121212">
    
    <!-- 🛡️ CIBERSEGURIDAD -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <title>AVJ Dev | Desarrollo Web Corporativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-dark: #121212;
            --text-muted: #555555;
            --accent-neon: #ccff00;
            --card-bg: #ffffff;
            --card-border: #eaeaea;
            --nav-bg: rgba(248, 249, 250, 0.95);
            --transition-fast: 0.3s ease;
            --wa-color: #25D366;
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --text-dark: #f8f9fa;
            --text-muted: #aaaaaa;
            --card-bg: #151515;
            --card-border: #2a2a2a;
            --nav-bg: rgba(10, 10, 10, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-dark); line-height: 1.6; transition: background-color var(--transition-fast), color var(--transition-fast); }

        /* 🚀 NAVEGACIÓN ESTRATÉGICA (Inspirada en 46167.jpg) */
        header { position: sticky; top: 0; z-index: 1000; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--card-border); }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 5vw; max-width: 1400px; margin: 0 auto; }
        
        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: -0.5px; color: var(--text-dark); text-decoration: none; }
        .logo span { color: var(--accent-neon); }

        .nav-links { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--accent-neon); }

        /* Botón COTIZAR (Estilo 46167.jpg) */
        .btn-cotizar { 
            padding: 0.6rem 1.5rem; border: 2px solid var(--text-dark); color: var(--text-dark);
            background: transparent; font-weight: 800; font-size: 0.8rem; cursor: pointer; text-transform: uppercase;
            transition: all 0.3s; margin-left: 1rem; border-radius: 4px;
        }
        .btn-cotizar:hover { background: var(--text-dark); color: var(--bg-color); }
        [data-theme="dark"] .btn-cotizar { border-color: var(--card-border); color: var(--bg-color); }

        /* Resto de secciones igual que el código anterior... */
        .hero { display: flex; flex-direction: column; justify-content: center; min-height: calc(100vh - 80px); position: relative; perspective: 1000px; }
        #canvas-container { position: absolute; top: 0; right: 0; width: 55%; height: 100%; z-index: 0; pointer-events: none; }
        .hero-content { position: relative; z-index: 10; max-width: 650px; padding: 5vw; }
        .title-3d { font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; text-transform: uppercase; line-height: 0.9; margin-bottom: 1.5rem; text-shadow: 2px 2px 0px var(--accent-neon); }
        
        .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Acordeones y demás footer igual... */
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#" class="logo">AVJ<span>DEV</span></a>
            <div style="display: flex; align-items: center;">
                <ul class="nav-links">
                    <li><a href="#hero">HOME</a></li>
                    <li><a href="#nosotros">NOSOTROS</a></li>
                    <li><a href="#proyectos">PROYECTOS</a></li>
                    <li><a href="#faqs">FAQS</a></li>
                    <li><a href="#contacto">CONTACTO</a></li>
                </ul>
                <button class="btn-cotizar secure-contact" data-plan="completa">COTIZAR</button>
                <button class="theme-toggle" id="themeToggle" style="margin-left: 1rem;">🌓</button>
            </div>
        </nav>
    </header>

    <main id="hero">
        <!-- Resto del contenido manteniendo la estructura anterior -->
    </main>
    
    <!-- Incluye el resto de secciones (Projects, Pricing, Footer) aquí, usando el mismo script de ciberseguridad -->
</body>
</html>
